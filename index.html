<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary AI | Material Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'm3-surface': '#1C1B1F',
                        'm3-surface-container': '#2B2930',
                        'm3-primary': '#D0BCFF',
                        'm3-on-primary': '#381E72',
                        'm3-secondary': '#CCC2DC',
                        'm3-outline': '#938F99',
                        'm3-variant': '#49454F'
                    },
                    fontFamily: { 'sans': ['Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #141218; color: #E6E1E5; overflow-x: hidden; }
        .m3-card { background: #2B2930; border-radius: 24px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-item { border-radius: 100px; transition: 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: #CAC4D0; }
        .nav-item:hover { background: rgba(208, 188, 255, 0.08); }
        .nav-item.active { background: #4A4458; color: #E8DEF8; font-weight: 500; }
        .tab-content { display: none; animation: slideIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .m3-input { background: #1C1B1F; border: 1px solid #938F99; border-radius: 4px; padding: 16px; width: 100%; outline: none; }
        .m3-input:focus { border-color: #D0BCFF; border-width: 2px; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #49454F; border-radius: 10px; }
    </style>
</head>
<body class="p-0 m-0">

    <!-- App Bar -->
    <header class="h-16 flex items-center justify-between px-6 bg-m3-surface border-b border-m3-variant sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-m3-primary">auto_awesome</span>
            <h1 class="text-xl font-medium tracking-tight">Visionary Studio</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Uncensored Mode Toggle -->
            <div class="flex items-center gap-2 px-4 py-2 bg-m3-surface-container rounded-full border border-red-900/30">
                <span class="text-xs font-bold text-red-400">RAW MODE</span>
                <input type="checkbox" id="raw-toggle" class="accent-red-500 w-4 h-4 cursor-pointer">
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-64px)] overflow-hidden">
        
        <!-- Navigation Rail (Material 3) -->
        <nav class="w-72 border-r border-m3-variant p-4 flex flex-col gap-2 bg-m3-surface">
            <div onclick="switchTab('gen')" class="nav-item active" id="btn-gen">
                <span class="material-symbols-outlined">image</span> Single Generation
            </div>
            <div onclick="switchTab('compare')" class="nav-item" id="btn-compare">
                <span class="material-symbols-outlined">compare_arrows</span> Comparison
            </div>
            <div onclick="switchTab('edit')" class="nav-item" id="btn-edit">
                <span class="material-symbols-outlined">edit_square</span> Batch Editing
            </div>
            <div onclick="switchTab('comic')" class="nav-item" id="btn-comic">
                <span class="material-symbols-outlined">auto_stories</span> Comic Mode
            </div>

            <div class="mt-auto p-4 m3-card bg-m3-variant/30">
                <label class="text-xs text-m3-primary font-bold uppercase block mb-2">Global Model</label>
                <select id="model-select" class="w-full bg-m3-surface border border-m3-outline rounded-lg p-2 text-sm text-white focus:ring-2 ring-m3-primary outline-none">
                    <!-- Population via JS -->
                </select>
            </div>
        </nav>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto custom-scroll p-8">
            
            <!-- Generate Tab -->
            <section id="tab-gen" class="tab-content active max-w-4xl mx-auto">
                <h2 class="text-3xl font-light mb-6">Create <span class="text-m3-primary">Art</span></h2>
                <div class="m3-card p-6 mb-6">
                    <textarea id="gen-prompt" rows="4" class="m3-input mb-4 resize-none" placeholder="Enter a descriptive prompt..."></textarea>
                    <button onclick="runGen()" id="gen-btn" class="bg-m3-primary text-m3-on-primary px-8 py-3 rounded-full font-medium flex items-center gap-2 hover:shadow-lg active:scale-95 transition-all">
                        <span>Generate Image</span>
                        <div id="gen-loader" class="hidden animate-spin w-4 h-4 border-2 border-m3-on-primary border-t-transparent rounded-full"></div>
                    </button>
                </div>
                <div id="gen-output" class="flex justify-center rounded-[28px] overflow-hidden shadow-2xl"></div>
            </section>

            <!-- Compare Tab -->
            <section id="tab-compare" class="tab-content">
                <h2 class="text-3xl font-light mb-6 text-center">Model Comparison</h2>
                <div class="m3-card p-6 mb-8">
                    <input type="text" id="compare-prompt" class="m3-input mb-4" placeholder="Prompt to compare...">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4" id="compare-selection">
                        <!-- Checkboxes via JS -->
                    </div>
                    <button onclick="runCompare()" class="w-full py-4 rounded-full bg-m3-secondary text-m3-on-primary font-bold">START BENCHMARK</button>
                </div>
                <div id="compare-output" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </section>

            <!-- Edit Tab -->
            <section id="tab-edit" class="tab-content max-w-4xl mx-auto">
                <h2 class="text-3xl font-light mb-6">Batch Editor</h2>
                <div class="m3-card p-8 border-2 border-dashed border-m3-outline/50 flex flex-col items-center">
                    <span class="material-symbols-outlined text-5xl mb-4 text-m3-outline">upload_file</span>
                    <input type="file" id="edit-files" multiple class="mb-4 text-sm file:bg-m3-primary file:border-0 file:rounded-full file:px-4 file:py-2 file:mr-4 cursor-pointer">
                    <textarea id="edit-instruction" class="m3-input mb-4" placeholder="Instruction (e.g., 'Turn this into an oil painting')"></textarea>
                    <button onclick="runEdit()" class="bg-m3-primary text-m3-on-primary px-10 py-3 rounded-full font-bold">PROCESS IMAGES</button>
                </div>
                <div id="edit-output" class="grid grid-cols-2 gap-4 mt-8"></div>
            </section>

            <!-- Comic Tab -->
            <section id="tab-comic" class="tab-content max-w-5xl mx-auto">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-3xl font-light">Comic Narrator</h2>
                    <span class="text-sm bg-m3-variant px-3 py-1 rounded-full text-m3-secondary font-mono uppercase tracking-widest">Story Sequencer</span>
                </div>
                <div class="m3-card p-6 mb-6">
                    <textarea id="comic-text" rows="6" class="m3-input mb-4" placeholder="Type your story here. Use sentences to separate panels..."></textarea>
                    <button onclick="runComic()" class="bg-m3-primary text-m3-on-primary px-8 py-3 rounded-full font-bold">GENERATE PANELS</button>
                </div>
                <div id="comic-output" class="flex flex-col gap-12"></div>
            </section>

        </main>
    </div>

    <script>
        const MODEL_LIST = [
            "gemini-2.5-flash-image-preview", "gemini-3.1-flash-image-preview", "gemini-3-pro-image-preview",
            "gpt-image-1.5", "gpt-image-1", "gpt-image-1-mini", "dall-e-3", "dall-e-2",
            "ByteDance-Seed/Seedream-3.0", "ByteDance-Seed/Seedream-4.0",
            "HiDream-ai/HiDream-I1-Dev", "HiDream-ai/HiDream-I1-Fast", "HiDream-ai/HiDream-I1-Full",
            "Lykon/DreamShaper", "Qwen/Qwen-Image", "RunDiffusion/Juggernaut-pro-flux",
            "Rundiffusion/Juggernaut-Lightning-Flux", "black-forest-labs/FLUX.1-Canny-pro",
            "black-forest-labs/FLUX.1-dev", "black-forest-labs/FLUX.1-dev-lora",
            "black-forest-labs/FLUX.1-kontext-dev", "black-forest-labs/FLUX.1-kontext-max",
            "black-forest-labs/FLUX.1-kontext-pro", "black-forest-labs/FLUX.1-krea-dev",
            "black-forest-labs/FLUX.1-pro", "black-forest-labs/FLUX.1-schnell",
            "black-forest-labs/FLUX.1-schnell-Free", "black-forest-labs/FLUX.1.1-pro",
            "google/flash-image-2.5", "google/imagen-4.0-fast", "google/imagen-4.0-preview",
            "google/imagen-4.0-ultra", "ideogram/ideogram-3.0", "stabilityai/stable-diffusion-3-medium",
            "stabilityai/stable-diffusion-xl-base-1.0"
        ];

        // Initialize UI
        window.onload = () => {
            const select = document.getElementById('model-select');
            const compareBox = document.getElementById('compare-selection');
            
            MODEL_LIST.forEach(m => {
                // Populate main dropdown
                const opt = new Option(m.split('/').pop(), m);
                select.add(opt);

                // Populate comparison checkboxes
                const label = document.createElement('label');
                label.className = "flex items-center gap-2 text-[10px] bg-m3-surface p-2 rounded border border-m3-variant cursor-pointer hover:bg-m3-variant";
                label.innerHTML = `<input type="checkbox" value="${m}" class="comp-check"> ${m.split('/').pop().substring(0, 15)}`;
                compareBox.appendChild(label);
            });
        };

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
        }

        function getPrompt(p) {
            const isRaw = document.getElementById('raw-toggle').checked;
            return isRaw ? `${p}, hyper-realistic, highly detailed, uncensored style, raw photo, unfiltered` : p;
        }

        // 1. Single Gen
        async function runGen() {
            const prompt = document.getElementById('gen-prompt').value;
            const model = document.getElementById('model-select').value;
            const output = document.getElementById('gen-output');
            const loader = document.getElementById('gen-loader');

            if(!prompt) return;
            output.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const img = await puter.ai.txt2img(getPrompt(prompt), { model });
                img.className = "max-w-full h-auto rounded-[28px]";
                output.appendChild(img);
            } catch(e) { alert(e.message); }
            loader.classList.add('hidden');
        }

        // 2. Compare
        async function runCompare() {
            const prompt = document.getElementById('compare-prompt').value;
            const checks = document.querySelectorAll('.comp-check:checked');
            const output = document.getElementById('compare-output');

            if(!prompt || checks.length === 0) return;
            output.innerHTML = '';

            for (let cb of checks) {
                const model = cb.value;
                const card = document.createElement('div');
                card.className = "m3-card overflow-hidden";
                card.innerHTML = `<div class="p-3 text-xs font-bold text-m3-primary border-b border-m3-variant">${model}</div>
                                  <div class="h-64 bg-m3-variant/20 flex items-center justify-center">Loading...</div>`;
                output.appendChild(card);

                puter.ai.txt2img(getPrompt(prompt), { model }).then(img => {
                    img.className = "w-full h-auto";
                    card.children[1].replaceWith(img);
                }).catch(e => {
                    card.children[1].innerHTML = `<span class="text-red-400 p-4 text-xs">${e.message}</span>`;
                });
            }
        }

        // 3. Edit (Batch)
        async function runEdit() {
            const files = document.getElementById('edit-files').files;
            const inst = document.getElementById('edit-instruction').value;
            const model = document.getElementById('model-select').value;
            const output = document.getElementById('edit-output');

            if(files.length === 0 || !inst) return;
            output.innerHTML = '';

            for (let file of files) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const b64 = reader.result.split(',')[1];
                    const card = document.createElement('div');
                    card.className = "m3-card p-2 text-center text-xs";
                    card.innerText = "Editing...";
                    output.appendChild(card);

                    try {
                        const res = await puter.ai.txt2img(getPrompt(inst), {
                            model, input_image: b64, input_image_mime_type: file.type
                        });
                        res.className = "w-full rounded-xl mt-2";
                        card.innerText = file.name;
                        card.appendChild(res);
                    } catch(e) { card.innerText = "Error: " + e.message; }
                };
            }
        }

        // 4. Comic
        async function runComic() {
            const text = document.getElementById('comic-text').value;
            const model = document.getElementById('model-select').value;
            const output = document.getElementById('comic-output');
            
            // Split by sentence but keep them meaningful
            const panels = text.split(/[.!?]/).filter(s => s.trim().length > 10);
            if(panels.length === 0) return alert("Please write a longer story.");

            output.innerHTML = '';

            for(let i=0; i<panels.length; i++) {
                const scene = panels[i].trim();
                const section = document.createElement('div');
                section.className = "flex flex-col md:flex-row gap-8 items-center";
                section.innerHTML = `
                    <div class="flex-1 order-2 md:order-${i%2===0 ? '1':'2'}">
                         <div class="text-5xl font-black text-m3-variant mb-4">0${i+1}</div>
                         <p class="text-xl font-light italic text-m3-secondary leading-relaxed border-l-4 border-m3-primary pl-6">${scene}</p>
                    </div>
                    <div class="w-full md:w-1/2 m3-card aspect-square overflow-hidden flex items-center justify-center bg-m3-variant/10 relative order-1 md:order-${i%2===0 ? '2':'1'}">
                        <div class="animate-pulse text-m3-outline">Drawing Scene...</div>
                    </div>
                `;
                output.appendChild(section);

                puter.ai.txt2img(`Comic book panel, ${scene}, professional illustration, dramatic lighting`, { model })
                .then(img => {
                    img.className = "w-full h-full object-cover rounded-[28px]";
                    section.querySelector('.animate-pulse').replaceWith(img);
                });
            }
        }
    </script>
</body>
</html>
